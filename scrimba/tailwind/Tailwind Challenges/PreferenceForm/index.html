<!doctype html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-amber-100 flex flex-col items-center py-4">
        <main class="w-11/12 flex flex-col gap-4">
            <h1 class="text-amber-900 font-extrabold text-4xl">Leaf &amp; Brew Box</h1>
            <h2 class="text-amber-800 font-bold text-lg">Preferences</h2>
            
            <form class="bg-white flex flex-col gap-4 p-4 shadow-md relative rounded-md">
                 <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" width="64px" class="fill-amber-700 absolute -top-6 right-2"><path d="M160-120v-80h640v80H160Zm160-160q-66 0-113-47t-47-113v-400h640q33 0 56.5 23.5T880-760v120q0 33-23.5 56.5T800-560h-80v120q0 66-47 113t-113 47H320Zm0-480h320-400 80Zm400 120h80v-120h-80v120ZM560-360q33 0 56.5-23.5T640-440v-320H400v16l72 58q2 2 8 16v170q0 8-6 14t-14 6H300q-8 0-14-6t-6-14v-170q0-2 8-16l72-58v-16H240v320q0 33 23.5 56.5T320-360h240ZM360-760h40-40Z"/></svg>
                
                <!-- SUBSCRIPTION -->
                <fieldset class="flex flex-col gap-4">
                    <legend class="text-amber-800 font-bold text-md my-2">Subscription</legend>
                    
                    <div class="flex flex-col gap-4 sm:flex-row sm:flex-wrap sm:gap-4 justify-center sm:w-full">
                        <!-- SUBSCRIPTION TIER -->
                        <section class="flex flex-col sm:w-5/12 grow">
                            <label class="font-bold text-sm">Subscription Tier</label>
                            <select class="border-2 border-amber-300 rounded-md py-1 px-2 text-sm">
                                <option>Basic (1 tea per month)</option>
                                <option>Standard (3 teas per month)</option>
                                <option>Deluxe (5 teas per month)</option>
                            </select>
                        </section>
                        
                        <!-- TASTE PREFERENCE -->
                        <section class="flex flex-col sm:w-5/12 grow">
                            <legend class="font-bold text-sm">Taste Preference</legend>
                            <section class="text-sm">
                                <section>
                                    <input type="checkbox" id="fruity" name="fruity"/>
                                    <label for="fruity">Fruity</label>
                                </section>
                                <section>
                                    <input type="checkbox" id="floral" name="floral"/>
                                    <label for="floral">Floral</label>
                                </section>
                                <section>
                                    <input type="checkbox" id="sweet" name="sweet"/>
                                    <label for="sweet">Sweet</label>
                                </section>
                            </section>
                        </section>
                        
                        <!-- LOOSE OR BAGGED -->
                        <section class="flex flex-col sm:w-5/12 grow sm:order-last">
                            <legend class="font-bold text-sm">Loose Leaf or Bagged?</legend>
                            <section class="text-sm">
                                <section>
                                    <input type="radio" id="loose" name="tea-preference"/>
                                    <label for="loose">Loose</label>
                                </section>
                                <section>
                                    <input type="radio" id="bagged" name="tea-preference"/>
                                    <label for="bagged">Bagged</label>
                                </section>
                                <section>
                                    <input type="radio" id="either" name="tea-preference"/>
                                    <label for="either">Either</label>
                                </section>
                            </section>
                        </section>
                        
                        <!-- DIETARY RESTRICTIONS -->
                        <section class="flex flex-col sm:w-5/12 grow">
                            <label for="delivery_instructions" class="font-bold text-sm">Dietary Restrictions</label>
                            <textarea id="delivery_instructions" class="border-2 border-amber-300 rounded-md py-1 px-2 text-sm hover:border-lime-600 hover:bg-amber-100 focus:border-lime-600 focus:bg-amber-100 focus:outline-lime-600"></textarea>
                        </section>

                    </div>
                    
                </fieldset>                                
                
                <!-- CUSTOMER DETAILS -->
                <fieldset class="flex flex-col gap-4 sm:flex-row">
                    <legend class="text-amber-800 font-bold text-md my-2 flex justify-between w-full items-center">
                        Details
                        <svg xmlns="http://www.w3.org/2000/svg" class="fill-amber-700" viewBox="0 -960 960 960" width="35px"><path d="M240-160q-50 0-85-35t-35-85H40v-440q0-33 23.5-56.5T120-800h560v160h120l120 160v200h-80q0 50-35 85t-85 35q-50 0-85-35t-35-85H360q0 50-35 85t-85 35Zm0-80q17 0 28.5-11.5T280-280q0-17-11.5-28.5T240-320q-17 0-28.5 11.5T200-280q0 17 11.5 28.5T240-240Zm480 0q17 0 28.5-11.5T760-280q0-17-11.5-28.5T720-320q-17 0-28.5 11.5T680-280q0 17 11.5 28.5T720-240Zm-40-200h170l-90-120h-80v120Z"/></svg>  
                    </legend>
                    
                    <div class="flex flex-col gap-4 sm:flex-row sm:flex-wrap sm:gap-4 justify-center sm:w-full">                    
                        <!-- NAME -->
                        <section class="flex flex-col sm:w-5/12 grow">
                            <label class="font-bold text-sm">Full Name</label>
                            <input class="border-2 border-amber-300 rounded-md py-1 px-2 text-sm" type="text" value="Earl Greyson"/>
                        </section>
                        
                        <!-- EMAIL -->
                        <section class="flex flex-col sm:w-5/12 grow">
                            <label class="font-bold text-sm">Email</label>
                            <input class="border-2 border-amber-300 rounded-md py-1 px-2 text-sm" type="email" value="earlgreyson@tealovers.com"/>
                        </section>
                        
                        <!-- DELIVERY -->
                        <section class="flex flex-col sm:w-5/12 grow">
                            <h3 class="font-bold text-sm">Delivery Address</h3>
                            <section class="flex flex-col border-2 border-amber-300 rounded-md py-1 px-2 text-sm  hover:bg-amber-100">
                                <p>12 Brewster Lane</p>
                                <p>Steepville</p>
                                <p>TE 67894</p>
                                <a class="text-amber-600 font-bold text-xs underline hover:text-amber-700 mt-2" href="#">Change address</a>
                            </section>
                        </section>
                        
                        <!-- PAYMENT -->
                        <section class="flex flex-col sm:w-5/12 grow">
                            <h3 class="font-bold text-sm">Payment Method</h3>
                            <section class="border-2 border-amber-300 rounded-md py-1 px-2 text-sm hover:bg-amber-100">
                                <section class="flex flex-row justify-between">
                                    <p>....8523</p>
                                    <section class="flex flex-row gap-2">
                                        <img src="img/logo_visa.png" alt="visa" class="w-7"/>
                                        <img src="img/logo_mastercard.png" alt="mastercard" class="w-7 opacity-50"/>
                                    </section>
                                </section>
                                <a class="text-amber-600 font-bold text-xs underline hover:text-amber-700 mt-2" href="#">Change payment method</a>
                            </section>
                        </section>
                    </div>
                   
                </fieldset>
                
                <!-- SAVE BUTTON -->
                <input class="px-4 py-2 bg-amber-900 text-white font-bold hover:cursor-pointer rounded-md" type="submit" value="Save Preferences"/>
                                
            </form>
        </main>
        <footer class="flex item-center">
            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" class="fill-amber-700 my-4" width="24px"><path d="M160-120v-80h640v80H160Zm160-160q-66 0-113-47t-47-113v-400h640q33 0 56.5 23.5T880-760v120q0 33-23.5 56.5T800-560h-80v120q0 66-47 113t-113 47H320Zm0-480h320-400 80Zm400 120h80v-120h-80v120ZM560-360q33 0 56.5-23.5T640-440v-320H400v16l72 58q2 2 8 16v170q0 8-6 14t-14 6H300q-8 0-14-6t-6-14v-170q0-2 8-16l72-58v-16H240v320q0 33 23.5 56.5T320-360h240ZM360-760h40-40Z"/></svg>
        </footer>
    </body>
</html>

<style>
    body {
        font-family: 'Helvetica', sans-serif;
        box-sizing: border-box;
    }
    * {
        /* outline: 1px solid goldenrod; */
        margin: 0;
        padding: 0;
        box-sizing: border-box;        
    }
    
</style>
